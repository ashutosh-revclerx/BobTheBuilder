server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # In Kubernetes, let the frontend service serve the SPA and proxy API calls
    # to the backend service. This makes `kubectl port-forward svc/btb-frontend-service 8080:80`
    # enough for the whole app.
    location /api/ {
        proxy_pass http://btb-backend-service:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
