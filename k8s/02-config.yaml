---
apiVersion: v1
kind: ConfigMap
metadata:
  name: btb-config
  namespace: btb-production
data:
  NODE_ENV: "production"
  LLM_SERVICE_URL: "http://btb-llm-service:8000"

---
apiVersion: v1
kind: Secret
metadata:
  name: btb-secrets
  namespace: btb-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://dashboard_user:dashboard_pass@btb-postgres-service:5432/dashboard_db"
