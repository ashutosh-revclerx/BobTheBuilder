apiVersion: apps/v1
kind: Deployment
metadata:
  name: btb-frontend
  namespace: btb-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: btb-frontend
  template:
    metadata:
      labels:
        app: btb-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/btb-frontend:v1
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: btb-frontend-service
  namespace: btb-production
spec:
  selector:
    app: btb-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: btb-frontend-hpa
  namespace: btb-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: btb-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
