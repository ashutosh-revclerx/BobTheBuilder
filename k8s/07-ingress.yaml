apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: btb-ingress
  namespace: btb-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - http:
      paths:
      # Route /api/v1/* to the backend service
      - path: /api/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: btb-backend-service
            port:
              number: 3001
      # Route all other traffic to the frontend
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: btb-frontend-service
            port:
              number: 80
