<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Config-driven dashboard builder platform. Build customer-facing dashboards visually." />
    
    <!-- Performance Optimization: Preconnect and Async Font Loading to prevent render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Fira+Code:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Fira+Code:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Fira+Code:wght@400;500&display=swap">
    </noscript>
    <title>BoardTool — Dashboard Builder</title>
    <style>
      :root { --blue-500: #2563eb; --bg-primary: #ffffff; }
      body { margin: 0; font-family: 'DM Sans', sans-serif; background: var(--bg-primary); }
      .app-shell-loading {
        display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center;
        position: fixed; top: 0; left: 0; z-index: 9999;
      }
      .shell-spinner {
        width: 32px; height: 32px; border: 3px solid #eff6ff;
        border-top: 3px solid var(--blue-500); border-radius: 50%;
        animation: shell-spin 0.8s linear infinite;
      }
      @keyframes shell-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell-loading">
        <div class="shell-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
