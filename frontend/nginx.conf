server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match the backend's 50 MB file-upload cap. nginx default is 1 MB, which
    # would silently truncate Excel/CSV/PDF uploads before they hit the backend.
    client_max_body_size 50m;

    # Proxy all API calls to the backend container.
    # Handles both /api/v1/... (production default) and /api/... paths.
    location /api {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # SPA fallback — serve index.html for any non-file path so
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
