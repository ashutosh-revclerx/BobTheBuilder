
services:
  postgres:
    image: postgres:16
    container_name: dashboard_db
    environment:
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard_pass
      POSTGRES_DB: dashboard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  llm:
    build: ./apps/backend/services/llm
    container_name: dashboard_llm
    env_file:
      - ./apps/backend/services/llm/.env
    ports:
      - "8000:8000"
    # Mount the source for hot-reload during development. Remove this volume
    # in production if you want the baked-in image to be authoritative.
    volumes:
      - ./apps/backend/services/llm/app:/service/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
  pgadmin_data:
