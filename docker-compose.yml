
services:
  postgres:
    image: postgres:16
    container_name: dashboard_db
    environment:
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard_pass
      POSTGRES_DB: dashboard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dashboard_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://dashboard_user:dashboard_pass@postgres:5432/dashboard_db
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # VITE_API_BASE_URL is left unset so the app defaults to /api/v1,
      # which nginx proxies to the backend container. Override here if your
      # API lives at a different origin (e.g. a separate subdomain).
      # args:
      #   VITE_API_BASE_URL: https://api.yourdomain.com/api/v1
    container_name: dashboard_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
